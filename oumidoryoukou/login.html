<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>アクセス認証</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #111;
    font-family: 'Helvetica Neue', Arial, sans-serif;
  }
  .card {
    background: #1a1a1a;
    border: 1px solid #2a2a2a;
    padding: 56px 48px;
    width: 100%;
    max-width: 400px;
    text-align: center;
  }
  .label {
    font-size: 10px;
    letter-spacing: .2em;
    color: #555;
    margin-bottom: 32px;
    text-transform: uppercase;
  }
  .title {
    font-size: 18px;
    font-weight: 600;
    color: #eee;
    margin-bottom: 8px;
  }
  .sub {
    font-size: 12px;
    color: #555;
    margin-bottom: 40px;
  }
  input[type="password"] {
    width: 100%;
    padding: 14px 16px;
    background: #111;
    border: 1px solid #333;
    color: #eee;
    font-size: 15px;
    letter-spacing: .1em;
    outline: none;
    margin-bottom: 16px;
    transition: border-color .2s;
  }
  input[type="password"]:focus { border-color: #666; }
  button {
    width: 100%;
    padding: 14px;
    background: #eee;
    color: #111;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: .1em;
    border: none;
    cursor: pointer;
    transition: background .2s;
  }
  button:hover { background: #fff; }
  .error {
    font-size: 12px;
    color: #c0392b;
    margin-top: 16px;
    display: none;
  }
</style>
</head>
<body>
<div class="card">
  <p class="label">PRIVATE PREVIEW</p>
  <p class="title">近江度量衡<br>Webリニューアル</p>
  <p class="sub">ワイヤーフレーム確認用</p>
  <input type="password" id="pw" placeholder="パスワードを入力" autofocus>
  <button onclick="check()">確認する</button>
  <p class="error" id="err">パスワードが違います</p>
</div>
<script>
  var PW = 'leinoumi0317';
  function check() {
    var v = document.getElementById('pw').value;
    if (v === PW) {
      sessionStorage.setItem('oumi_auth', '1');
      var params = new URLSearchParams(location.search);
      var next = params.get('next');
      location.href = (next && next.indexOf(location.hostname) !== -1) ? next : 'index.html';
    } else {
      document.getElementById('err').style.display = 'block';
      document.getElementById('pw').value = '';
      document.getElementById('pw').focus();
    }
  }
  document.getElementById('pw').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') check();
  });
</script>
</body>
</html>
